name: Golden-astronauts – CI/CD

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

jobs:
  build-test-deploy:
    runs-on: shipfox-performance-4cpu-ubuntu-2404

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/golden-astronauts:latest

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lightsail Containers
        run: |
          aws lightsail create-container-service-deployment \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --containers '{
              "app": {
                "image": "'"${DOCKER_IMAGE}"'",
                "ports": {
                  "8080": "HTTP"
                }
              }
            }' \
            --public-endpoint '{
              "containerName": "app",
              "containerPort": 8080,
              "healthCheck": {
                "path": "/",
                "intervalSeconds": 10
              }
            }'
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/golden-astronauts:latest
          LIGHTSAIL_SERVICE_NAME: "lightsail-golden-astronauts"
